#configuracoes do crawler idood

#concorrencia
crawler.parallelism=${CRAWLER_PARALLELISM:5}

#yimeouts (segundos)
crawler.navigation-timeout=${CRAWLER_NAVIGATION_TIMEOUT:30}
crawler.selector-timeout=${CRAWLER_SELECTOR_TIMEOUT:10}

#retry Policy
crawler.max-retries=${CRAWLER_MAX_RETRIES:3}
crawler.retry-backoff-initial-ms=${CRAWLER_INITIAL_BACKOFF_MS:1000}
crawler.retry-backoff-multiplier=${CRAWLER_BACKOFF_MULTIPLIER:2.0}
crawler.retry-jitter-ms=${CRAWLER_JITTER_MS:200}
crawler.retry-max-backoff-ms=${CRAWLER_MAX_BACKOFF_MS:30000}

#rate Limiting (token bucket)
crawler.rate-limit-max-tokens=${CRAWLER_RATE_LIMIT_MAX_TOKENS:10}
crawler.rate-limit-refill-interval-ms=${CRAWLER_RATE_LIMIT_REFILL_INTERVAL_MS:1000}

#checkpoint
crawler.checkpoint-interval=${CRAWLER_CHECKPOINT_INTERVAL:10}
crawler.checkpoint-db-path=${CRAWLER_CHECKPOINT_DB_PATH:checkpoint.db}

#arquivos de entrada/saida
crawler.input-file=${CRAWLER_INPUT_FILE:urls/ifood_urls.csv}
crawler.output-file=${CRAWLER_OUTPUT_FILE:output/results.json}

#headers
crawler.user-agent=${CRAWLER_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36}

#logging
crawler.log-level=${CRAWLER_LOG_LEVEL:INFO}
crawler.log-file=${CRAWLER_LOG_FILE:logs/crawler.log}