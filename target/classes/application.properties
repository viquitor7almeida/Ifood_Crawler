concorrencia
crawler.parallelism=5

timeouts (segundos)
crawler.navigation-timeout=45
crawler.selector-timeout=10
crawler.render-timeout=15

retry Policy
crawler.max-retries=3
crawler.retry-backoff-initial-ms=500
crawler.retry-backoff-multiplier=2.0
crawler.retry-jitter-ms=200
crawler.retry-max-backoff-ms=15000

rate Limiting (token bucket)
crawler.rate-limit-max-tokens=10
crawler.rate-limit-refill-interval-ms=1000

checkpoint
crawler.checkpoint-interval=25
crawler.checkpoint-db-path=checkpoint.db

crawlers
crawler.flaresolverr-url=http://flaresolverr:8191/v1
crawler.flaresolverr-timeout=120
crawler.flaresolverr-session-ttl=3600

arquivos de entrada/saida
crawler.input-file=data/ifood_urls_padrao_item_1000.csv
crawler.output-file=output/results.json
crawler.cookie-store-path=cookies.json

headers
crawler.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36

logging
crawler.log-level=INFO
crawler.log-file=logs/crawler.log
